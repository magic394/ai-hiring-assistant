<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="url(#grad)" stroke="#1e293b" stroke-width="2"/>
  
  <!-- AI Brain/Neural Network icon -->
  <g transform="translate(50,50)">
    <!-- Center node -->
    <circle cx="0" cy="0" r="8" fill="white" opacity="0.95"/>
    
    <!-- Connected nodes -->
    <circle cx="-18" cy="-12" r="5" fill="white" opacity="0.8"/>
    <circle cx="18" cy="-12" r="5" fill="white" opacity="0.8"/>
    <circle cx="-12" cy="16" r="5" fill="white" opacity="0.8"/>
    <circle cx="12" cy="16" r="5" fill="white" opacity="0.8"/>
    <circle cx="0" cy="-22" r="5" fill="white" opacity="0.8"/>
    <circle cx="22" cy="8" r="5" fill="white" opacity="0.8"/>
    <circle cx="-22" cy="8" r="5" fill="white" opacity="0.8"/>
    
    <!-- Connection lines -->
    <line x1="0" y1="-8" x2="0" y2="-17" stroke="white" stroke-width="1.5" opacity="0.7"/>
    <line x1="0" y1="8" x2="-8" y2="12" stroke="white" stroke-width="1.5" opacity="0.7"/>
    <line x1="0" y1="8" x2="8" y2="12" stroke="white" stroke-width="1.5" opacity="0.7"/>
    <line x1="-8" y1="-4" x2="-13" y2="-8" stroke="white" stroke-width="1.5" opacity="0.7"/>
    <line x1="8" y1="-4" x2="13" y2="-8" stroke="white" stroke-width="1.5" opacity="0.7"/>
    <line x1="5" y1="3" x2="17" y2="5" stroke="white" stroke-width="1.5" opacity="0.7"/>
    <line x1="-5" y1="3" x2="-17" y2="5" stroke="white" stroke-width="1.5" opacity="0.7"/>
    
    <!-- Sparkle/star accents -->
    <polygon points="-28,-28 -26,-24 -22,-24 -26,-20 -28,-16 -30,-20 -34,-24 -30,-24" fill="white" opacity="0.6"/>
    <polygon points="28,-28 30,-24 34,-24 30,-20 28,-16 26,-20 22,-24 26,-24" fill="white" opacity="0.6"/>
    <polygon points="0,28 2,32 6,32 3,35 4,40 0,37 -4,40 -3,35 -6,32 -2,32" fill="white" opacity="0.6"/>
  </g>
  
  <!-- Briefcase/document indicator -->
  <rect x="35" y="68" width="30" height="18" rx="3" fill="white" opacity="0.3"/>
  <rect x="42" y="62" width="16" height="6" rx="2" fill="white" opacity="0.4"/>
</svg>
